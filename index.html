<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Talatanaw — Team Monitor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #e0e0e0; font-family: 'DM Mono','Courier New',monospace; min-height: 100vh; padding: 24px 16px; }
    .root { max-width: 960px; margin: 0 auto; }

    .ph { border-bottom: 1px solid #222; padding-bottom: 20px; margin-bottom: 24px; }
    .pm { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .ptitle { font-size: 26px; font-weight: 700; color: #f0f0f0; display: flex; align-items: center; gap: 10px; }
    .ptitle i { color: #4ade80; font-size: 22px; }
    .psub { font-size: 11px; color: #555; margin-top: 3px; letter-spacing: 0.5px; text-transform: uppercase; }
    .filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .fb { background: #1e1e1e; border: 1px solid #333; color: #aaa; font-size: 12px; padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .fb.active, .fb:hover { background: #2a2a2a; border-color: #555; color: #f0f0f0; }

    .overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
    @media(max-width: 600px) { .overview-grid { grid-template-columns: 1fr; } }

    .mp, .budget-overview { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 18px 20px; }
    .mr, .bov-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
    .ml { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
    .mpct, .bov-amt { font-size: 28px; font-weight: 700; color: #4ade80; }
    .mbb, .bov-bar-bg { height: 8px; background: #2a2a2a; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
    .mbf, .bov-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .mbf { background: #4ade80; }
    .tdots, .bov-meta { display: flex; gap: 16px; flex-wrap: wrap; }
    .di, .bov-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #555; }
    .dot, .bov-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .bov-sub { font-size: 12px; color: #555; margin-bottom: 8px; }

    .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 20px; }
    @media(max-width: 600px) { .stats { grid-template-columns: repeat(2,1fr); } }
    .sc { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 14px 16px; }
    .sl { font-size: 11px; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .sn { font-size: 26px; font-weight: 700; }
    .ss { font-size: 11px; margin-top: 2px; }

    .cards { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; }
    @media(max-width: 600px) { .cards { grid-template-columns: 1fr; } }

    .tc { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 16px; transition: border-color 0.2s; }
    .tc.blocked { border-color: #3d1a1a; }
    .tc.at-risk  { border-color: #3d2e0a; }
    .tc.hidden   { display: none; }
    .tc.solo { grid-column: 1 / -1; max-width: 460px; margin: 0 auto; width: 100%; }

    .ch { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .cl { display: flex; align-items: center; gap: 10px; }
    .av { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .tn { font-size: 14px; font-weight: 700; color: #f0f0f0; }
    .tl { font-size: 11px; color: #555; margin-top: 2px; }

    .badge { font-size: 10px; padding: 3px 10px; border-radius: 12px; font-weight: 600; white-space: nowrap; }
    .bg { background: #0a2a1a; color: #4ade80; border: 1px solid #1a4a2a; }
    .ba { background: #2a1a05; color: #fb923c; border: 1px solid #4a2a10; }
    .br { background: #2a0a0a; color: #f87171; border: 1px solid #4a1a1a; }

    .pr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; font-size: 11px; color: #666; }
    .pb { height: 5px; background: #2a2a2a; border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
    .pf { height: 100%; border-radius: 3px; transition: width 0.4s; }

    .divider { height: 1px; background: #222; margin: 10px 0; }

    .budget-section { margin-bottom: 6px; }
    .budget-row { display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: #666; margin-bottom: 5px; }
    .budget-nums { display: flex; gap: 4px; align-items: baseline; }
    .budget-used { font-size: 13px; font-weight: 700; color: #e0e0e0; }
    .budget-alloc { font-size: 11px; color: #555; }
    .bbar-bg { height: 5px; background: #2a2a2a; border-radius: 3px; overflow: hidden; }
    .bbar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
    .over-budget { color: #f87171 !important; }

    .ut { font-size: 12px; color: #888; line-height: 1.6; margin-bottom: 6px; }
    .ut strong { color: #ccc; }
    .bt { font-size: 12px; color: #f87171; line-height: 1.6; margin-bottom: 6px; }
    .bt strong { color: #fca5a5; }

    .cf { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
    .ts { font-size: 10px; color: #444; }
    .ub { background: #1e1e1e; border: 1px solid #333; color: #aaa; font-size: 11px; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .ub:hover { background: #2a2a2a; border-color: #4ade80; color: #4ade80; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 24px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; }
    .mh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .mh h3 { font-size: 15px; font-weight: 700; color: #f0f0f0; }
    .close-btn { background: none; border: none; color: #555; font-size: 20px; cursor: pointer; line-height: 1; padding: 2px; }
    .close-btn:hover { color: #aaa; }

    .fg { margin-bottom: 16px; }
    .flab { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
    .fi { width: 100%; background: #111; border: 1px solid #2a2a2a; border-radius: 8px; color: #e0e0e0; font-family: inherit; font-size: 13px; padding: 9px 12px; outline: none; transition: border-color 0.15s; }
    .fi:focus { border-color: #444; }
    textarea.fi { resize: vertical; min-height: 70px; }

    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .sr { display: flex; align-items: center; gap: 12px; }
    .sr input[type=range] { flex: 1; accent-color: #4ade80; cursor: pointer; }
    .sv { font-size: 18px; font-weight: 700; color: #4ade80; min-width: 44px; text-align: right; }

    .status-picker { display: flex; gap: 8px; }
    .so { flex: 1; padding: 8px 4px; border-radius: 8px; border: 1px solid #2a2a2a; background: #111; color: #555; font-size: 11px; text-align: center; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .so:hover { border-color: #444; color: #aaa; }
    .so.sg { border-color: #1a4a2a; background: #0a2a1a; color: #4ade80; }
    .so.sa { border-color: #4a2a10; background: #2a1a05; color: #fb923c; }
    .so.sr2 { border-color: #4a1a1a; background: #2a0a0a; color: #f87171; }

    .ma { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
    .btn-cancel { background: transparent; border: 1px solid #2a2a2a; color: #555; font-size: 12px; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-family: inherit; }
    .btn-cancel:hover { border-color: #444; color: #aaa; }
    .btn-save { background: #0a2a1a; border: 1px solid #1a4a2a; color: #4ade80; font-size: 12px; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: 700; }
    .btn-save:hover { background: #0f3a22; }
    .pw-error { font-size: 11px; color: #f87171; margin-top: 6px; display: none; }

    .green { color: #4ade80; } .amber { color: #fb923c; } .red { color: #f87171; } .gray { color: #aaa; }
  </style>
</head>
<body>
<div class="root">

  <div class="ph">
    <div class="pm">
      <div>
        <div class="ptitle"><i class="ti ti-hexagon-letter-t" aria-hidden="true"></i>Talatanaw</div>
        <div class="psub">Team Monitor &nbsp;·&nbsp; 5 sub-teams &nbsp;·&nbsp; 1 project</div>
      </div>
      <div class="filters">
        <button class="fb active" onclick="filterCards('all',this)" data-filter="all">All</button>
        <button class="fb" onclick="filterCards('on-track',this)" data-filter="on-track">On track</button>
        <button class="fb" onclick="filterCards('at-risk',this)" data-filter="at-risk">At risk</button>
        <button class="fb" onclick="filterCards('blocked',this)" data-filter="blocked">Blocked</button>
      </div>
    </div>
  </div>

  <div class="overview-grid">
    <div class="mp">
      <div class="mr"><span class="ml">Overall progress</span><span class="mpct" id="mpct">0%</span></div>
      <div class="mbb"><div class="mbf" id="mbar" style="width:0%"></div></div>
      <div class="tdots" id="tdots"></div>
    </div>
    <div class="budget-overview">
      <div class="bov-row"><span class="ml">Rover budget</span><span class="bov-amt" id="bov-pct">0%</span></div>
      <div class="bov-sub"><span id="bov-used">₱0</span> used of <span id="bov-total">₱0</span> allocated</div>
      <div class="bov-bar-bg"><div class="bov-bar-fill" id="bov-bar" style="width:0%;background:#4ade80"></div></div>
      <div class="bov-meta" id="bov-meta"></div>
    </div>
  </div>

  <div class="stats">
    <div class="sc"><div class="sl">Sub-teams</div><div class="sn gray">5</div><div class="ss gray">on this project</div></div>
    <div class="sc"><div class="sl">On track</div><div class="sn green" id="s-on">0</div><div class="ss green">teams healthy</div></div>
    <div class="sc"><div class="sl">At risk</div><div class="sn amber" id="s-ar">0</div><div class="ss amber">needs attention</div></div>
    <div class="sc"><div class="sl">Blocked</div><div class="sn red" id="s-bl">0</div><div class="ss red">action required</div></div>
  </div>

  <div class="cards" id="cards"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="mh"><h3 id="mtitle">Update</h3><button class="close-btn" onclick="closeModal()"><i class="ti ti-x" aria-hidden="true"></i></button></div>
    <div id="s-auth">
      <div class="fg">
        <label class="flab">Team password</label>
        <input class="fi" type="password" id="pw" placeholder="Password" />
        <div class="pw-error" id="pwerr">Incorrect password. Try again.</div>
      </div>
      <div class="ma">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="checkPw()">Unlock</button>
      </div>
    </div>
    <div id="s-edit" style="display:none">
      <div class="fg">
        <label class="flab">Progress</label>
        <div class="sr"><input type="range" min="0" max="100" step="1" id="ep" oninput="document.getElementById('epv').textContent=this.value+'%'" /><span class="sv" id="epv">0%</span></div>
      </div>
      <div class="fg">
        <label class="flab">Status</label>
        <div class="status-picker">
          <button class="so" data-val="on-track" onclick="pickStatus(this)">On track</button>
          <button class="so" data-val="at-risk"  onclick="pickStatus(this)">At risk</button>
          <button class="so" data-val="blocked"  onclick="pickStatus(this)">Blocked</button>
        </div>
      </div>
      <div class="fg">
        <div class="input-row">
          <div>
            <label class="flab">Budget allocated (₱)</label>
            <input class="fi" type="number" id="e-alloc" min="0" placeholder="e.g. 5000" />
          </div>
          <div>
            <label class="flab">Budget used (₱)</label>
            <input class="fi" type="number" id="e-used" min="0" placeholder="e.g. 2500" />
          </div>
        </div>
      </div>
      <div class="fg">
        <label class="flab">Update note</label>
        <textarea class="fi" id="eu" placeholder="What's the latest progress?"></textarea>
      </div>
      <div class="fg">
        <label class="flab">Blocker <span style="color:#333">(leave blank if none)</span></label>
        <textarea class="fi" id="eb" placeholder="Any blockers?"></textarea>
      </div>
      <div class="ma">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveUpdate()"><i class="ti ti-check" style="font-size:12px" aria-hidden="true"></i> Save</button>
      </div>
    </div>
  </div>
</div>

<script>
  const TEAMS = [
    { id:'mobility',  name:'Mobility',      lead:'Gian Crisologo',   password:'mobility123', status:'on-track', progress:0, update:'', blocker:'', timestamp:'', dot:'#60a5fa', fill:'#60a5fa', initials:'MO', allocated:0, used:0 },
    { id:'drone',     name:'Drone',          lead:'John Isaac Olave', password:'drone123',    status:'on-track', progress:0, update:'', blocker:'', timestamp:'', dot:'#22d3ee', fill:'#22d3ee', initials:'DR', allocated:0, used:0 },
    { id:'navigation',name:'Navigation',     lead:'Roentgen',         password:'nav123',      status:'on-track', progress:0, update:'', blocker:'', timestamp:'', dot:'#a78bfa', fill:'#a78bfa', initials:'NA', allocated:0, used:0 },
    { id:'arm',       name:'Robotic Arm',    lead:'Earl Balabag',     password:'arm123',      status:'on-track', progress:0, update:'', blocker:'', timestamp:'', dot:'#fb923c', fill:'#fb923c', initials:'RA', allocated:0, used:0 },
    { id:'drill',     name:'Robotic Drill',  lead:'Franz Deo',        password:'drill123',    status:'on-track', progress:0, update:'', blocker:'', timestamp:'', dot:'#f87171', fill:'#f87171', initials:'RD', allocated:0, used:0 }
  ];

  function fmt(n) { return '₱' + Math.round(n).toLocaleString(); }
  function bClass(s) { return s==='on-track'?'bg':s==='at-risk'?'ba':'br'; }
  function bLabel(s) { return s==='on-track'?'On track':s==='at-risk'?'At risk':'Blocked'; }
  function pColor(s) { return s==='on-track'?'#4ade80':s==='at-risk'?'#fb923c':'#f87171'; }
  function cardExtra(s) { return s==='blocked'?'blocked':s==='at-risk'?'at-risk':''; }
  function budgetColor(pct) { return pct>100?'#f87171':pct>80?'#fb923c':'#4ade80'; }

  function renderAll() {
    const c = document.getElementById('cards');
    c.innerHTML = '';
    let tot=0, on=0, ar=0, bl=0, dots=[], totalAlloc=0, totalUsed=0;

    TEAMS.forEach((t, i) => {
      tot += t.progress;
      if (t.status==='on-track') on++; else if (t.status==='at-risk') ar++; else bl++;
      totalAlloc += t.allocated;
      totalUsed  += t.used;
      dots.push(`<div class="di"><div class="dot" style="background:${t.dot}"></div><span>${t.name} ${t.progress}%</span></div>`);

      const solo = (i === TEAMS.length-1) && (TEAMS.length % 2 !== 0);
      const blk  = t.blocker ? `<p class="bt"><strong>Blocker:</strong> ${t.blocker}</p>` : '';
      const ts   = t.timestamp ? `<span class="ts">${t.timestamp}</span>` : `<span class="ts" style="color:#333">No updates yet</span>`;
      const bPct     = t.allocated > 0 ? Math.min(Math.round((t.used/t.allocated)*100), 100) : 0;
      const bPctReal = t.allocated > 0 ? Math.round((t.used/t.allocated)*100) : 0;
      const bCol     = budgetColor(bPctReal);
      const overCls  = bPctReal > 100 ? 'over-budget' : '';

      c.insertAdjacentHTML('beforeend', `
        <div class="tc ${cardExtra(t.status)}${solo?' solo':''}" data-status="${t.status}" id="card-${t.id}">
          <div class="ch">
            <div class="cl">
              <div class="av" style="background:${t.dot}22;color:${t.dot}">${t.initials}</div>
              <div><div class="tn">${t.name}</div><div class="tl">${t.lead}</div></div>
            </div>
            <span class="badge ${bClass(t.status)}">${bLabel(t.status)}</span>
          </div>
          <div class="pr"><span>Progress</span><span style="color:${pColor(t.status)}">${t.progress}%</span></div>
          <div class="pb"><div class="pf" style="width:${t.progress}%;background:${t.fill}"></div></div>
          <div class="divider"></div>
          <div class="budget-section">
            <div class="budget-row">
              <span><i class="ti ti-coin" style="font-size:12px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>Budget</span>
              <div class="budget-nums">
                <span class="budget-used ${overCls}">${fmt(t.used)}</span>
                <span class="budget-alloc"> / ${fmt(t.allocated)}</span>
                <span style="font-size:11px;color:${bCol};margin-left:4px">${bPctReal}%</span>
              </div>
            </div>
            <div class="bbar-bg"><div class="bbar-fill" style="width:${bPct}%;background:${bCol}"></div></div>
          </div>
          <div class="divider"></div>
          ${t.update ? `<p class="ut"><strong>Update:</strong> ${t.update}</p>` : '<p class="ut" style="color:#444">No update posted yet.</p>'}
          ${blk}
          <div class="cf">${ts}<button class="ub" onclick="openModal('${t.id}')"><i class="ti ti-edit" style="font-size:11px" aria-hidden="true"></i> Update</button></div>
        </div>`);
    });

    const avg = Math.round(tot / TEAMS.length);
    document.getElementById('mpct').textContent = avg + '%';
    document.getElementById('mbar').style.width = avg + '%';
    document.getElementById('tdots').innerHTML = dots.join('');
    document.getElementById('s-on').textContent = on;
    document.getElementById('s-ar').textContent = ar;
    document.getElementById('s-bl').textContent = bl;

    const roverPct    = totalAlloc > 0 ? Math.round((totalUsed/totalAlloc)*100) : 0;
    const roverCapped = Math.min(roverPct, 100);
    const roverCol    = budgetColor(roverPct);
    document.getElementById('bov-pct').textContent  = roverPct + '%';
    document.getElementById('bov-pct').style.color  = roverCol;
    document.getElementById('bov-used').textContent = fmt(totalUsed);
    document.getElementById('bov-total').textContent= fmt(totalAlloc);
    document.getElementById('bov-bar').style.width  = roverCapped + '%';
    document.getElementById('bov-bar').style.background = roverCol;
    document.getElementById('bov-meta').innerHTML   = TEAMS.map(t => `<div class="bov-item"><div class="bov-dot" style="background:${t.dot}"></div><span>${t.name} ${fmt(t.used)}</span></div>`).join('');
  }

  let activeId = null, selStatus = null;

  function openModal(id) {
    activeId = id;
    const t = TEAMS.find(x => x.id === id);
    document.getElementById('mtitle').textContent = 'Update — ' + t.name;
    document.getElementById('s-auth').style.display = 'block';
    document.getElementById('s-edit').style.display = 'none';
    document.getElementById('pw').value = '';
    document.getElementById('pwerr').style.display = 'none';
    document.getElementById('modal').classList.add('open');
    setTimeout(() => document.getElementById('pw').focus(), 100);
  }

  function checkPw() {
    const t = TEAMS.find(x => x.id === activeId);
    if (document.getElementById('pw').value === t.password) {
      document.getElementById('s-auth').style.display = 'none';
      document.getElementById('s-edit').style.display = 'block';
      document.getElementById('ep').value = t.progress;
      document.getElementById('epv').textContent = t.progress + '%';
      document.getElementById('eu').value = t.update;
      document.getElementById('eb').value = t.blocker;
      document.getElementById('e-alloc').value = t.allocated || '';
      document.getElementById('e-used').value  = t.used || '';
      selStatus = t.status;
      document.querySelectorAll('.so').forEach(b => {
        b.className = 'so';
        if (b.dataset.val === t.status)
          b.classList.add(t.status==='on-track'?'sg':t.status==='at-risk'?'sa':'sr2');
      });
    } else {
      document.getElementById('pwerr').style.display = 'block';
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  }

  function pickStatus(btn) {
    selStatus = btn.dataset.val;
    document.querySelectorAll('.so').forEach(b => b.className = 'so');
    btn.classList.add(selStatus==='on-track'?'sg':selStatus==='at-risk'?'sa':'sr2');
  }

  function saveUpdate() {
    const t = TEAMS.find(x => x.id === activeId);
    t.progress  = parseInt(document.getElementById('ep').value);
    t.status    = selStatus || t.status;
    t.update    = document.getElementById('eu').value.trim();
    t.blocker   = document.getElementById('eb').value.trim();
    t.allocated = parseFloat(document.getElementById('e-alloc').value) || 0;
    t.used      = parseFloat(document.getElementById('e-used').value)  || 0;
    const now   = new Date();
    t.timestamp = 'Today, ' + now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    closeModal();
    renderAll();
    const ab = document.querySelector('.fb.active');
    if (ab) applyFilter(ab.dataset.filter || 'all');
  }

  function closeModal() { document.getElementById('modal').classList.remove('open'); }

  function filterCards(status, btn) {
    document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    btn.dataset.filter = status;
    applyFilter(status);
  }

  function applyFilter(status) {
    document.querySelectorAll('.tc').forEach(card => {
      card.classList.toggle('hidden', status !== 'all' && card.dataset.status !== status);
    });
  }

  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.getElementById('s-auth').style.display !== 'none') checkPw();
  });

  renderAll();
</script>
</body>
</html>
